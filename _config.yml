# Site settings
title: Lansing Tech Studio
email: contact@lansingtechstudio.org
description: >-
  Empowering youth through technology, robotics, and community service.
  Supporting FIRST LEGO League teams, hosting coding bootcamps, and making a difference.
baseurl: ""
url: "https://lansing-tech-studio.github.io"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from

# Navigation
header_pages:
  - about.md
  - programs.md
  - outreach.md
  - resources.md
  - sponsors.md
  - contact.md

# Social media
github_username: Lansing-Tech-Studio
facebook_username: 61572896006614
youtube_username: "@LansingTechStudio"
facebook_url: "https://www.facebook.com/profile.php?id=61572896006614"
youtube_url: "https://www.youtube.com/@lansingtechstudio"

# Custom variables
logo: /assets/images/logo.png
donate_url: "https://www.zeffy.com/en-US/donation-form/general-giving-15"
# Web3Forms access key for the contact form (safe to expose publicly; get one at https://web3forms.com)
web3forms_access_key: "bd52f61f-8931-4882-9f74-b6074e2d1d2a"
mission_statement: "The Lansing Tech Studio empowers the next generation by igniting their passion for technology, innovation, leadership, and service, cultivating tomorrow’s leaders driven to shape a better future in their communities and the world."

# Collections
collections:
  team_bios:
    output: true
    permalink: /:collection/:name/
  blog_posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - SiteLayout.md
