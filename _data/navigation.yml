# Header navigation. Items have a title plus any of:
#   url:        plain link (also makes a dropdown parent clickable)
#   dropdown:   list of {title, url} children
#   collection: name of a Jekyll collection ("programs", "resources") — children
#               are generated from it (sorted by order), so adding a file to
#               _programs/ or _resources/ adds a menu entry with no edits here
# An item with both url and children renders as a clickable link that opens its
# submenu on hover (desktop) or via the chevron button (mobile/keyboard).
# Active-state matching in _layouts/default.html uses "page.url contains url"
# (exact match for "/"), so keep urls aligned with page permalinks
# (trailing slash included).
- title: Home
  url: /
- title: About
  dropdown:
    - title: About Us
      url: /about/
    - title: Blog
      url: /blog/
- title: Programs
  url: /programs/
  collection: programs
- title: Resources
  url: /resources/
  collection: resources
- title: Get Involved
  dropdown:
    - title: Outreach
      url: /outreach/
    - title: Sponsors
      url: /sponsors/
# Contact is reached via the "Contact Us" button in .nav-actions, not a nav item.
# Workshops lives in a separate repo served at /workshops/ — to restore a
# nav link, add:
# - title: Workshops
#   url: /workshops/
